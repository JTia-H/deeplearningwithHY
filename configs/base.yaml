train:
  seed: 42
  batch_size: 16
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.01
  max_seq_len: 256
  diffusion_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  sampling_steps: 200
  hidden_dim: 64
  grad_clip_norm: 1.0
  warmup_epochs: 3
  min_learning_rate: 0.00005
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  log_csv_path: models/checkpoints/train_log.csv

